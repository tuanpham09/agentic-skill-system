name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Validate all bundled skills
        run: node packages/cli/dist/index.js skill validate-all

      - name: Check bundle size
        run: |
          SIZE=$(npm pack packages/cli/ --dry-run 2>&1 | grep "unpacked size" | grep -oE '[0-9.]+ [kMG]B' || echo "unknown")
          echo "Bundle size: $SIZE"